name: Android Rumble Build
on:
  workflow_dispatch:
  push:

env:
  DOLPHIN_REF: "2606"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Liberar disco no runner
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost || true

      - name: Clonar o Dolphin (com submodulos)
        run: |
          git clone --branch "$DOLPHIN_REF" --depth 1 \
            --recurse-submodules --shallow-submodules \
            https://github.com/dolphin-emu/dolphin.git dolphin

      - name: Aplicar fix de rumble (id real em vez do indice)
        working-directory: dolphin
        run: |
          f=Source/Core/InputCommon/ControllerInterface/Android/Android.cpp
          sed -i 's#s_dolphin_vibrator_manager_get_vibrator, i)#s_dolphin_vibrator_manager_get_vibrator, vibrator_ids[i])#' "$f"
          grep -q 'vibrator_ids\[i\])' "$f" || { echo "ERRO: o fix nao aplicou (codigo mudou nesse ref)"; exit 1; }
          echo "fix aplicado:"; grep -n 'vibrator_ids\[i\]' "$f"

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: NDK + plataforma + cmake
        run: yes | sdkmanager "platforms;android-36" "ndk;29.0.14206865" "cmake;3.22.1" >/dev/null

      - name: Build debug APK
        working-directory: dolphin/Source/Android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: dolphin-rumble-debug-apk-${{ env.DOLPHIN_REF }}
          path: dolphin/Source/Android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
